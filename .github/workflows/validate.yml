name: Validate safe-start

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "bundle-v*"

permissions:
  contents: read

concurrency:
  group: safe-start-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate shell syntax
        run: bash -n install.sh uninstall.sh install-all.sh

      - name: Verify deterministic archives
        run: shasum -a 256 -c SHA256SUMS

      - name: Test with Apple Python
        run: |
          /usr/bin/python3 --version
          env PATH="/usr/bin:/bin:/usr/sbin:/sbin" PYTHONDONTWRITEBYTECODE=1 /usr/bin/python3 tests/test_detectors.py
          env PATH="/usr/bin:/bin:/usr/sbin:/sbin" PYTHONDONTWRITEBYTECODE=1 /usr/bin/python3 tests/test_hooks.py
          env PATH="/usr/bin:/bin:/usr/sbin:/sbin" PYTHONDONTWRITEBYTECODE=1 /usr/bin/python3 tests/test_lifecycle.py

      - name: Test with runner Python
        run: |
          python3 --version
          env PYTHONDONTWRITEBYTECODE=1 python3 tests/test_detectors.py
          env PYTHONDONTWRITEBYTECODE=1 python3 tests/test_hooks.py
          env PYTHONDONTWRITEBYTECODE=1 python3 tests/test_lifecycle.py

      - name: Verify a release tag matches VERSION
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        run: |
          read -r safe_start_version < VERSION
          lesson_version="$(unzip -p clinician-first-cli-session.zip clinician-first-cli-session/VERSION)"
          test "v${safe_start_version}" = "${GITHUB_REF_NAME}" || test "v${lesson_version}" = "${GITHUB_REF_NAME}"

      - name: Smoke-test the stable bundle in an isolated home
        run: |
          mkdir -p "$RUNNER_TEMP/offcall-bundle-home"
          HOME="$RUNNER_TEMP/offcall-bundle-home" /bin/bash install-all.sh
          test -f "$RUNNER_TEMP/offcall-bundle-home/.claude/skills/clinician-first-cli-session/SKILL.md"
          test -f "$RUNNER_TEMP/offcall-bundle-home/.agents/skills/clinician-first-cli-session/SKILL.md"
          test ! -e "$RUNNER_TEMP/offcall-bundle-home/.agents/skills/safe-start"
